name: Daily Onchain Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '20 1 * * *'

concurrency:
  group: blockchain-watch-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily update
        env:
          DAILY_CAP: "500"
          MAX_DAYS_PER_RUN: "1"
        run: python -m src.main daily

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data state
          git diff --cached --quiet || git commit -m "daily: update generated data"
          git push
